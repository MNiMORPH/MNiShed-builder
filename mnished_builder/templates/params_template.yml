# {label}: independent calibration, {decade_start} to {decade_end}.
# A02 model structure (default): soil / intermediate / deep; frozen_ground enabled; k=8 active params.
# A03 option: replace f_exfiltration_intermediate (active→false) with log__leakance_R_intermediate
#             (active→true); optionally add f_exfiltration_deep and log__H_threshold_deep.

modules:
  snowpack:          true
  frozen_ground:     true
  rain_on_snow:      true
  direct_runoff:     false
  dtr_fgi_decay:     true
  et_water_stress:   false
  et_reservoir_draw: true

dakota:
  ego_initial_samples:       300
  ego_seed:                  12345
  ps_max_evaluations:        200
  ps_convergence_tolerance:  1.0e-4
  evaluation_concurrency:    4

driver:
  config_template:       '{config_name}'
  metric:                'KGE_logKGE'
  spin_up_cycles:        1
  routing_N:             2
  n_reservoirs:          3
  reservoir_order:       ['soil', 'intermediate', 'deep']
  decade_start:          '{decade_start}'
  decade_end:            '{decade_end}'
  enforce_water_balance: 'global'

parameters:

  log__t_recession_soil:
    description: "log10 soil-zone recession time scale [days]"
    lower:   1.0
    upper:   4.5
    initial: {log__t_recession_soil}
    fixed:   {log__t_recession_soil}
    active:  true

  log__t_recession_intermediate:
    description: "log10 intermediate recession time scale [days]"
    lower:   1.0
    upper:   4.5
    initial: {log__t_recession_intermediate}
    fixed:   {log__t_recession_intermediate}
    active:  true

  log__t_recession_deep:
    description: "log10 deep groundwater recession time scale [days]"
    lower:   3.5
    upper:   5.0
    initial: {log__t_recession_deep}
    fixed:   {log__t_recession_deep}
    active:  true

  f_exfiltration_soil:
    description: "fraction of soil-zone drainage to stream (remainder recharges intermediate)"
    lower:   0.01
    upper:   0.99
    initial: {f_exfiltration_soil}
    fixed:   {f_exfiltration_soil}
    active:  true

  f_exfiltration_intermediate:
    description: "fraction of intermediate drainage to stream (remainder recharges deep) — A02; deactivate for A03 leakance"
    lower:   0.01
    upper:   0.99
    initial: {f_exfiltration_intermediate}
    fixed:   {f_exfiltration_intermediate}
    active:  true

  # A03 junction parameters — activate in place of f_exfiltration_intermediate
  log__leakance_R_intermediate:
    description: "log10 leakance resistance through confining unit [days]; Q_leak = max(H_inter - H_deep, 0) / R — A03"
    lower:   0.5
    upper:   4.0
    initial: 2.0
    fixed:   2.0
    active:  false

  f_exfiltration_deep:
    description: "fraction of above-threshold deep drainage to stream; remainder lost vertically to sub-stream units — A03"
    lower:   0.01
    upper:   0.99
    initial: 0.5
    fixed:   0.5
    active:  false

  log__H_threshold_deep:
    description: "log10 deep dead-storage threshold [mm]; springs inactive below this head — A03"
    lower:   0.0
    upper:   3.5
    initial: 2.5
    fixed:   2.5
    active:  false

  # Post-spinup initial storage — activate when spin-up equilibrium is poorly constrained
  log__H0_soil:
    description: "log10 initial soil-zone water depth [mm] — post-spin-up override"
    lower:   1.0
    upper:   4.0
    initial: 2.5
    fixed:   2.5
    active:  false

  log__H0_intermediate:
    description: "log10 initial intermediate reservoir water depth [mm] — post-spin-up override"
    lower:   1.0
    upper:   4.5
    initial: 2.5
    fixed:   2.5
    active:  false

  log__H0_deep:
    description: "log10 initial deep reservoir water depth [mm] — post-spin-up override"
    lower:   1.0
    upper:   4.5
    initial: 2.5
    fixed:   2.5
    active:  false

  PDD_melt_factor:
    description: "degree-day snowmelt rate [mm SWE / degC / day]"
    lower:   0.1
    upper:   10.0
    initial: {PDD_melt_factor}
    fixed:   {PDD_melt_factor}
    active:  true

  recession_b_soil:
    description: "power-law recession exponent for soil zone [dimensionless]"
    lower:   1.5
    upper:   6.0
    initial: {recession_b_soil}
    fixed:   {recession_b_soil}
    active:  true

  recession_b_intermediate:
    description: "intermediate recession exponent fixed at 2.203 (Brutsaert-Nieber lower envelope)"
    lower:   1.0
    upper:   6.0
    initial: 2.203
    fixed:   2.203
    active:  false

  log__fdd_threshold:
    description: "log10 frozen-ground-index threshold [degC·day]; blocks infiltration when exceeded"
    lower:   0.0
    upper:   3.0
    initial: {log__fdd_threshold}
    fixed:   {log__fdd_threshold}
    active:  true

  snow_insulation_k:
    description: "snow insulation decay constant [mm⁻¹ SWE] — fixed at 0 (no insulation)"
    lower:   0.0
    upper:   0.5
    initial: 0.0
    fixed:   0.0
    active:  false

  et_scale:
    description: "global ET multiplier — inactive (water balance enforced globally)"
    lower:   0.5
    upper:   2.0
    initial: 1.0
    fixed:   1.0
    active:  false

  et_alpha:
    description: "ET partition fraction — fixed at 1.0 (all ET from soil)"
    lower:   0.01
    upper:   0.99
    initial: 1.0
    fixed:   1.0
    active:  false

  f_direct_runoff:
    description: "fast-bypass fraction of daily recharge — inactive"
    lower:   0.0
    upper:   0.5
    initial: 0.05
    fixed:   0.0
    active:  false

  baseflow_Q:
    description: "constant regional groundwater import [mm/day] — inactive"
    lower:   0.0
    upper:   0.5
    initial: 0.0
    fixed:   0.0
    active:  false

  log__routing_K:
    description: "log10 Nash-cascade storage time constant [days] — inactive"
    lower:   -1.0
    upper:    1.0
    initial:  0.0
    fixed:    0.0
    active:  false
